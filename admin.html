<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELORÉ Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">VELORÉ Admin</div>
      <a href="/" class="ghost-btn">Back to Home</a>
    </div>
  </header>

  <main class="container section-space admin-layout">
    <section class="admin-card">
      <h2>Admin Login</h2>
      <form id="loginForm" class="stack-form">
        <input name="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button class="primary-btn" type="submit">Login</button>
      </form>
      <p id="loginMsg" class="muted-text"></p>
    </section>

    <section class="admin-card" id="adminPanel" style="display:none;">
      <div class="admin-head">
        <h2>Categories</h2>
        <button id="logoutBtn" class="ghost-btn">Logout</button>
      </div>

      <form id="categoryForm" class="stack-form">
        <input name="categoryTitle" placeholder="Category name" required />
        <button class="primary-btn" type="submit">Add Category</button>
      </form>

      <div id="adminCategoriesList" class="admin-list"></div>

      <hr class="soft-line" />

      <h2>Products</h2>
      <form id="productForm" class="stack-form">
        <input name="title" placeholder="Product title" required />
        <input name="price" type="number" step="0.01" placeholder="New price" required />
        <input name="old_price" type="number" step="0.01" placeholder="Old price (optional)" />
        <input name="stock" type="number" min="0" placeholder="Stock" required />

        <div>
          <label class="muted-text" style="display:block;margin-bottom:8px;">Choose one or more categories</label>
          <div id="productCategoryChecks" class="category-check-grid"></div>
        </div>

        <label class="popup-toggle-row">
          <input type="checkbox" id="showPopupInput" name="show_popup" />
          <span>Show this product in popup on website</span>
        </label>

        <textarea name="description" placeholder="Description (optional)"></textarea>

        <div class="upload-box" id="productDropZone">
          <p>Drag & drop product images here</p>
          <p class="muted-text">or click to choose one or more files</p>
          <input type="file" id="productImageInput" accept="image/*" multiple hidden />
        </div>

        <div id="productPreviewGrid" class="multi-upload-preview" style="display:none;"></div>

        <button class="primary-btn" type="submit">Save Product</button>
      </form>

      <div class="admin-tools">
        <button id="cancelEditBtn" class="ghost-btn" style="display:none;">Cancel Edit</button>
      </div>

      <div id="adminProductsList" class="admin-list"></div>

      <hr class="soft-line" />

      <h2>Banners</h2>
      <form id="bannerForm" class="stack-form">
        <div class="upload-box" id="bannerDropZone">
          <p>Drag & drop banner image here</p>
          <p class="muted-text">or click to choose file</p>
          <input type="file" id="bannerImageInput" accept="image/*" hidden />
        </div>

        <img id="bannerPreview" class="upload-preview" style="display:none;" alt="preview" />
        <button class="primary-btn" type="submit">Add Banner</button>
      </form>

      <div id="adminBannersList" class="admin-list"></div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
